
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-Day Tech Event Schedule</title>
    <!-- CSS will be injected here by the build script -->
    <style id="injected-css"></style>
</head>
<body>
    <div class="container">
        <h1>1-Day Tech Event Schedule</h1>

        <div class="filter-container">
            <label for="category-filter">Filter by Category:</label>
            <input type="text" id="category-filter" placeholder="e.g., AI, Cloud, Frontend">
        </div>

        <div id="schedule-container" class="schedule-container">
            <!-- Schedule will be rendered here by JavaScript -->
        </div>
    </div>

    <!-- Data and JavaScript will be injected here by the build script -->
    <script id="injected-data"></script>
    <script id="injected-script"></script>
</body>
</html>
